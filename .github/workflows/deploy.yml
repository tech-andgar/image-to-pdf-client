name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.filter.outputs.source-changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Check for changes
      id: filter
      shell: bash
      run: |
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "source-changed=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
          if git diff --quiet HEAD~1 -- src/ public/ package.json tsconfig.json vite.config.js biome.json tailwind.config.js postcss.config.js components.json index.html '*.config.js' '*.config.ts'; then
            echo "source-changed=false" >> $GITHUB_OUTPUT
          else
            echo "source-changed=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "source-changed=true" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}

  build-and-deploy:
    needs: check-changes
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      if: needs.check-changes.outputs.source-changed == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup pnpm
      if: needs.check-changes.outputs.source-changed == 'true'
      uses: pnpm/action-setup@v2
      with:
        version: 10
        run_install: false

    - name: Get pnpm store directory
      if: needs.check-changes.outputs.source-changed == 'true'
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      if: needs.check-changes.outputs.source-changed == 'true'
      uses: actions/cache@v3
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      if: needs.check-changes.outputs.source-changed == 'true'
      run: pnpm install

    - name: Build application
      if: needs.check-changes.outputs.source-changed == 'true'
      run: GITHUB_PAGES=true pnpm run build

    - name: Run linting
      if: needs.check-changes.outputs.source-changed == 'true'
      run: pnpm run lint

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && needs.check-changes.outputs.source-changed == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.PERSONAL_TOKEN }}
        publish_dir: ./dist
        external_repository: tech-andgar/image-to-pdf-client-public
