<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)" />

  <!-- Document/PDF icon -->
  <g transform="translate(128, 128)">
    <!-- Paper -->
    <rect x="60" y="40" width="160" height="200" rx="12" ry="12" fill="url(#icon)" />
    <rect x="75" y="80" width="130" height="6" rx="3" fill="#E5E7EB" />
    <rect x="75" y="110" width="110" height="6" rx="3" fill="#E5E7EB" />
    <rect x="75" y="140" width="90" height="6" rx="3" fill="#E5E7EB" />
    <rect x="75" y="170" width="120" height="6" rx="3" fill="#E5E7EB" />

    <!-- Image/camera icon -->
    <g transform="translate(110, 55)">
      <!-- Camera body -->
      <rect x="10" y="30" width="40" height="25" rx="4" fill="#4F46E5" />
      <circle cx="35" cy="20" r="8" fill="#4F46E5" />
      <circle cx="35" cy="20" r="4" fill="#FFFFFF" />

      <!-- Lens -->
      <circle cx="35" cy="20" r="2" fill="#4F46E5" />

      <!-- Corner bracket -->
      <path d="M 10 30 L 10 20 L 15 20" stroke="#7C3AED" stroke-width="3" fill="none" />

      <!-- Image representation (simple frame) -->
      <rect x="0" y="0" width="60" height="40" rx="4" fill="none" stroke="#7C3AED" stroke-width="2" />
      <circle cx="15" cy="15" r="3" fill="#7C3AED" />
      <path d="M 35 10 L 45 20 L 35 30 L 30 25" fill="#7C3AED" />
    </g>
  </g>

  <!-- PDF Text Badge -->
  <g transform="translate(320, 404)">
    <rect x="0" y="0" width="40" height="20" rx="10" fill="rgba(255,255,255,0.9)" />
    <text x="20" y="13" text-anchor="middle" font-size="12" font-weight="bold" fill="#4F46E5">PDF</text>
  </g>
</svg>
